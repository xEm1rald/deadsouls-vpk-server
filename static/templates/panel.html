<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="DeadSouls ItemSettings — панель выбора скинов и глобальных настроек."
    />
    <title>DeadSouls | ItemSettings — панель</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="https://cdn.deadsouls.cc/website/favicon.ico">
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/styles.css" />
    <link rel="stylesheet" href="../styles/panel-styles.css" />
    <style id="auth-flicker-block">
      body { opacity: 0; pointer-events: none; }
    </style>
    <script>
      (async function checkAccess() {
        const token = localStorage.getItem('token');
        if (!token) {
          window.location.replace('/home');
          return;
        }
        try {
          const res = await fetch('/api/frontend/user_info', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (!res.ok) {
            window.location.replace('/home');
            return;
          }
          const data = await res.json();

          if (!data.hwid || data.hwid === 'None') {
            window.location.replace('/home');
            return;
          }

          if (!data.subscription_end_date || data.subscription_end_date === 'None') {
            window.location.replace('/home');
            return;
          }
          const subDate = new Date(data.subscription_end_date);
          if (subDate < new Date()) {
            window.location.replace('/home');
            return;
          }
          document.getElementById('auth-flicker-block').remove();
        } catch (err) {
          window.location.replace('/home');
        }
      })();
    </script>
    <script src="../scripts/i18n.js"></script>
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>

    <div class="topbar-wrap">
      <header class="topbar">
        <a href="/" class="logo" translate="no" style="text-decoration: none; color: inherit;">
          <span class="logo-main">DeadSouls</span>
          <span class="logo-sep">|</span>
          <span class="logo-sub">Panel</span>
        </a>
        <div class="topbar-end">

          <span
            id="save-status"
            class="save-status muted small"
            role="status"
            aria-live="polite"
          ></span>
          <button type="button" class="btn primary" id="btn-apply-all" data-i18n="install_vpk">Установить VPK</button>
          <button type="button" class="btn primary" id="btn-save-all" data-i18n="create_vpk">Cоздать VPK</button>
          <button type="button" class="btn primary home-icon-btn" id="btn-open-gallery">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>
          <button type="button" class="btn primary home-icon-btn" id="btn-open-presets">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
            </svg>
          </button>
          <a class="btn ghost home-icon-btn" href="/home" title="Кабинет">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </a>
          <button type="button" class="btn ghost home-icon-btn lang-switcher-btn">
            RU
          </button>
        </div>
      </header>
    </div>

    <main>
      <section id="gallery-section" class="fullscreen-overlay" hidden>
        <div class="fullscreen-header" style="justify-content: flex-end;">
          <button type="button" class="btn primary" id="btn-export-gallery" data-i18n="save_screenshots">
            Сохранить скриншоты
          </button>
        </div>
        <div class="fullscreen-content" id="main-gallery-area"></div>
      </section>

      <section id="presets-section" class="panel-section section panel-controls" aria-labelledby="label-presets" hidden>
        <span id="label-presets" class="section-label section-label--fat" data-i18n="presets">Пресеты</span>
        <div class="preset-grid card">
          <div class="preset-row">
            <label class="preset-label" for="preset-select" data-i18n="saved_presets">Сохраненные пресеты</label>
            <select id="preset-select" class="input preset-select"></select>
          </div>
          <div class="preset-row">
            <label class="preset-label" for="preset-name" data-i18n="new_preset_name">Имя нового пресета</label>
            <input
              id="preset-name"
              class="input preset-input"
              type="text"
              data-i18n-placeholder="new_preset_placeholder"
              placeholder="Например: Ranked / Fun / Demo"
              maxlength="48"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <div class="preset-actions">
            <button type="button" class="btn primary" id="btn-preset-save" data-i18n="btn_save">Сохранить</button>
            <button type="button" class="btn ghost" id="btn-preset-load" data-i18n="btn_load">Загрузить</button>
            <button type="button" class="btn ghost" id="btn-preset-delete" data-i18n="btn_delete">Удалить</button>
            <button type="button" class="btn ghost" id="btn-reset-all" data-i18n="btn_reset">Сбросить выбор</button>
            <button type="button" class="btn ghost home-icon-btn" id="btn-preset-export" title="Скачать пресет (Поделиться)" aria-label="Скачать пресет">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                <polyline points="16 6 12 2 8 6"></polyline>
                <line x1="12" y1="2" x2="12" y2="15"></line>
              </svg>
            </button>
          </div>
          <span class="muted small" id="preset-status" role="status" aria-live="polite"></span>

          <div id="preset-preview-area" class="preset-preview-area summary-gallery"></div>
        </div>
      </section>

      <section class="panel-section section" aria-labelledby="label-global">
        <span id="label-global" class="section-label section-label--fat" data-i18n="global"
          >Глобальное</span>
        <div id="global-grid" class="global-grid"></div>
      </section>

      <section class="panel-section section" aria-labelledby="label-skin">
        <span id="label-skin" class="section-label section-label--fat" data-i18n="skinchanger"
          >Скинчейнджер</span>

        <div class="skin-layout">
          <div class="hero-selector-wrapper">
            <button
              type="button"
              class="card hero-main-tile"
              id="btn-toggle-hero"
              aria-expanded="false"
              aria-controls="hero-drop-list"
            >
              <div class="hero-main-content">
                <span class="tile-label" data-i18n="select_hero">Выбор персонажа</span>
                <div class="hero-current-name" id="current-hero-name">
                  Выберите героя…
                </div>
              </div>
              <video
                id="hero-preview-video"
                class="hero-preview-video"
                muted
                loop
                autoplay
                playsinline
                preload="metadata"
              ></video>
            </button>
            <div
              class="hero-drop-list card"
              id="hero-drop-list"
              hidden
              role="region"
              aria-label="Список героев"
            >
              <input
                type="text"
                class="input search-box"
                data-i18n-placeholder="search_hero"
                placeholder="Поиск героя…"
                id="hero-search"
                spellcheck="false"
                autocomplete="off"
              />
              <div class="hero-grid-scroll" id="hero-grid"></div>
            </div>
          </div>

          <div
            id="hero-slots-area"
            class="slot-grid hero-items-panel"
            role="region"
            aria-label="Слоты предметов"
            hidden
          ></div>
        </div>
      </section>
    </main>

    <div
      id="picker-modal"
      class="modal-overlay"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <div class="modal-card card">
        <div class="modal-header">
          <h3 id="modal-title" class="modal-title-text" data-i18n="modal_selection">Выбор</h3>
          <button
            type="button"
            class="icon-btn"
            id="btn-close-picker"
            aria-label="Закрыть"
          >
            ×
          </button>
        </div>
        <input
          type="text"
          class="input search-box"
          id="item-search"
          data-i18n-placeholder="search_item"
          placeholder="Поиск…"
          spellcheck="false"
          autocomplete="off"
        />
        <div class="item-list" id="modal-item-list"></div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
      window.APP_CONFIG = {
        CDN_URL: "{{ CDN_URL }}",
        VALVE_HERO_RENDERS_CDN_URL: "{{ VALVE_HERO_RENDERS_CDN_URL }}"
      };
    </script>
    <script src="../scripts/panel.js" type="module"></script>
  </body>
</html>
